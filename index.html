<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expanding Horizons - English Learning Nebula</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP:wght@300;500&display=swap');

        :root {
            --space-black: #020617;
            --nebula-purple: #7c3aed;
            --nebula-pink: #db2777;
            --nebula-blue: #2563eb;
            --star-white: #f8fafc;
        }

        body {
            background-color: var(--space-black);
            color: var(--star-white);
            font-family: 'Noto Sans JP', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .nebula-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 30% 40%, rgba(124, 58, 237, 0.2) 0%, transparent 60%),
                radial-gradient(circle at 70% 60%, rgba(219, 39, 119, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 50% 50%, rgba(37, 99, 235, 0.1) 0%, transparent 70%);
            filter: blur(80px);
            animation: nebula-pulse 15s ease-in-out infinite alternate;
        }

        @keyframes nebula-pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 100px 150px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 200px 50px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 300px 250px, #ddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 400px 400px;
            opacity: 0.4;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 40px rgba(124, 58, 237, 0.4);
            transform: translateY(-8px);
        }

        .preview-box {
            width: 100%;
            height: 180px;
            background: rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .pdf-mock-canvas {
            width: 120px;
            height: 160px;
            background: white;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            padding: 10px;
            color: #333;
            transform: rotate(-2deg);
        }

        .pdf-line {
            height: 4px;
            background: #eee;
            margin-bottom: 6px;
            border-radius: 2px;
        }

        .title-font {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.2em;
        }

        .btn-nebula {
            background: linear-gradient(135deg, var(--nebula-purple), var(--nebula-pink));
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
            transition: all 0.3s ease;
        }

        .btn-nebula:hover {
            transform: scale(1.05);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #f87171;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.2s ease;
            display: none;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.8);
            color: white;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .admin-active .btn-delete {
            display: block;
        }

        .expand-text {
            display: inline-block;
            animation: tracking-expand 2s cubic-bezier(0.215, 0.610, 0.355, 1.000) both;
        }

        @keyframes tracking-expand {
            0% { letter-spacing: -0.5em; opacity: 0; }
            40% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        #adminOverlay {
            display: none;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(10px);
        }

        .loader {
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid var(--nebula-purple);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="nebula-bg"></div>
<div class="stars"></div>

<div class="container mx-auto px-4 py-16 relative z-10" id="mainContainer">
    <header class="text-center mb-24">
        <div class="inline-block mb-4 px-4 py-1 border border-purple-500/30 rounded-full bg-purple-500/10 text-purple-300 text-xs tracking-widest uppercase">
            Infinite Learning Journey
        </div>
        <h1 class="text-5xl md:text-7xl font-bold title-font bg-clip-text text-transparent bg-gradient-to-r from-purple-400 via-pink-400 to-blue-400">
            <span class="expand-text">EXPANDING</span><br>
            <span class="expand-text" style="animation-delay: 0.3s;">HORIZONS</span>
        </h1>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="worksheetGrid">
        <div class="glass-card border-dashed border-2 border-gray-700 group hover:bg-white/5 flex flex-col order-last cursor-pointer" onclick="openAdmin()">
            <div class="flex-grow flex flex-col items-center justify-center p-12 text-center">
                <div class="w-16 h-16 rounded-full bg-gray-800 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform border border-gray-700 group-hover:border-purple-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-gray-400 group-hover:text-purple-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                </div>
                <div class="text-sm font-bold text-gray-400 group-hover:text-white uppercase tracking-widest">Admin Control</div>
                <p class="text-[10px] text-gray-600 mt-2">Manage Intel Library</p>
            </div>
        </div>
    </div>
</div>

<div id="adminOverlay" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="glass-card w-full max-w-md p-10 shadow-2xl bg-slate-900/95 border-purple-500/30">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold title-font text-purple-400 tracking-tighter">MISSION CONTROL</h2>
            <button onclick="closeAdmin()" class="text-gray-500 hover:text-white text-3xl">&times;</button>
        </div>
        
        <div id="loginSection">
            <input type="password" id="adminPassword" placeholder="ACCESS CODE" class="w-full bg-black/50 border border-gray-700 rounded-xl p-4 mb-6 focus:outline-none focus:border-purple-500 text-white tracking-widest text-center">
            <div class="flex flex-col gap-3">
                <button onclick="verifyPassword()" class="w-full btn-nebula py-4 rounded-xl font-bold uppercase tracking-widest text-sm text-white">Auth & Entry</button>
                <button onclick="logoutAdmin()" id="logoutBtn" class="hidden w-full border border-gray-700 py-3 rounded-xl font-bold uppercase tracking-widest text-xs text-gray-500 hover:text-white transition-colors">Logout / Lock</button>
            </div>
        </div>

        <div id="uploadSection" class="hidden">
            <div class="border-2 border-dashed border-gray-700 rounded-xl p-10 text-center mb-6 hover:border-purple-500/50 transition-colors">
                <input type="file" id="fileInput" class="hidden" onchange="updateFileName()" accept="application/pdf">
                <label for="fileInput" class="cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto mb-4 text-purple-500/50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                    <span id="fileNameLabel" class="text-gray-400 text-xs">SELECT PDF (MAX 1MB)</span>
                </label>
            </div>
            <input type="text" id="wsTitle" placeholder="Worksheet Title" class="w-full bg-black/50 border border-gray-700 rounded-xl p-4 mb-6 focus:outline-none focus:border-purple-500 text-white">
            <button onclick="handleUpload()" id="uploadBtn" class="w-full btn-nebula py-4 rounded-xl font-bold uppercase tracking-widest text-sm text-white">Execute Upload</button>
        </div>
        
        <div id="statusMessage" class="mt-6 text-center text-xs font-bold h-4"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = JSON.parse(__firebase_config);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'nebula-ws-app';
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const overlay = document.getElementById('adminOverlay');
    const loginSection = document.getElementById('loginSection');
    const uploadSection = document.getElementById('uploadSection');
    const statusMsg = document.getElementById('statusMessage');
    const mainContainer = document.getElementById('mainContainer');
    const logoutBtn = document.getElementById('logoutBtn');
    const grid = document.getElementById('worksheetGrid');

    let isAdmin = false;
    let currentUser = null;

    const initAuth = async () => {
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        } catch (error) {
            console.error("Authentication failed:", error);
        }
    };

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user) {
            startSync();
        }
    });

    initAuth();

    const worksheetsCol = collection(db, 'artifacts', appId, 'public', 'data', 'worksheets');

    function startSync() {
        if (!currentUser) return;
        
        onSnapshot(worksheetsCol, (snapshot) => {
            const existingCards = grid.querySelectorAll('.glass-card:not(.order-last)');
            existingCards.forEach(c => c.remove());

            snapshot.forEach((doc) => {
                renderCard(doc.id, doc.data());
            });
        }, (error) => {
            console.error("Firestore sync error:", error);
        });
    }

    function renderCard(id, data) {
        const card = document.createElement('div');
        card.className = "glass-card flex flex-col";
        card.id = id;
        
        const rotation = (Math.random() * 4 - 2).toFixed(1);

        card.innerHTML = `
            <div class="preview-box">
                <div class="pdf-mock-canvas" style="transform: rotate(${rotation}deg);">
                    <div class="pdf-line w-3/4 bg-purple-200"></div>
                    <div class="pdf-line w-full"></div>
                    <div class="pdf-line w-full"></div>
                    <div class="pdf-line w-1/2"></div>
                </div>
            </div>
            <div class="p-8 flex flex-col flex-grow justify-between">
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-purple-400 bg-purple-400/10 text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded">
                            LIBRARY
                        </span>
                        <button class="btn-delete" onclick="window.deleteItem('${id}')">Delete</button>
                    </div>
                    <h3 class="text-2xl font-bold mb-3 text-white">${data.title}</h3>
                    <p class="text-gray-400 text-sm mb-8 leading-relaxed">${data.description || 'English learning resource.'}</p>
                </div>
                <div class="flex items-center justify-between border-t border-white/10 pt-6">
                    <span class="text-xs font-bold text-gray-500 tracking-tighter uppercase">
                        ${data.fileExt || 'PDF'} / ${data.fileSize || '0 MB'}
                    </span>
                    <button class="btn-nebula px-6 py-2.5 rounded-full text-xs font-bold text-white uppercase tracking-wider" 
                            onclick="window.downloadBinary('${data.fileName}', '${data.fileData}')">
                        Download
                    </button>
                </div>
            </div>
        `;

        grid.insertBefore(card, grid.lastElementChild);
    }

    window.handleUpload = async () => {
        if (!isAdmin || !currentUser) return;

        const title = document.getElementById('wsTitle').value;
        const file = document.getElementById('fileInput').files[0];
        const uploadBtn = document.getElementById('uploadBtn');

        if (!title || !file) {
            statusMsg.style.color = "#fbbf24";
            statusMsg.innerText = "TITLE & FILE REQUIRED";
            return;
        }

        // Firestore制限（1MB）のチェック
        const MAX_BYTES = 1000000; // 約1MB。Base64化すると約1.3倍になるため、余裕を持って設定
        if (file.size > 750000) { 
            statusMsg.style.color = "#f87171";
            statusMsg.innerText = "FILE TOO LARGE (MAX 750KB)";
            alert("Firestoreの制限により、Base64保存できるファイルサイズは750KB以下に制限されています。これより大きいファイルを扱うにはFirebase Storageへの移行が必要です。");
            return;
        }

        uploadBtn.disabled = true;
        uploadBtn.innerHTML = `<span class="loader"></span> UPLOADING...`;

        try {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Data = reader.result;
                
                // Base64化後のサイズチェック
                if (base64Data.length > 1048487) {
                    throw new Error("Base64 data exceeds Firestore limit.");
                }

                const docId = 'ws-' + Date.now();
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'worksheets', docId), {
                    title: title,
                    fileName: file.name,
                    fileExt: file.name.split('.').pop().toUpperCase(),
                    fileSize: (file.size / 1024 / 1024).toFixed(2) + ' MB',
                    fileData: base64Data,
                    createdAt: Date.now(),
                    description: '新たにライブラリに追加された英語学習コンテンツです。'
                });

                statusMsg.style.color = "#4ade80";
                statusMsg.innerText = "UPLOAD COMPLETE";
                uploadBtn.disabled = false;
                uploadBtn.innerText = "Execute Upload";
                setTimeout(window.closeAdmin, 1000);
            };
        } catch (err) {
            console.error(err);
            statusMsg.style.color = "#f87171";
            statusMsg.innerText = "UPLOAD FAILED: LIMIT EXCEEDED";
            uploadBtn.disabled = false;
            uploadBtn.innerText = "Execute Upload";
        }
    };

    window.deleteItem = async (id) => {
        if (!isAdmin || !currentUser) return;
        if (confirm("このアイテムを削除しますか？")) {
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'worksheets', id));
            } catch (err) {
                console.error("Delete failed:", err);
            }
        }
    };

    window.downloadBinary = (filename, base64) => {
        if (!base64) return alert("Data not found");
        const link = document.createElement("a");
        link.href = base64;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };

    window.openAdmin = () => {
        overlay.style.display = 'flex';
        statusMsg.innerText = '';
        if (!isAdmin) {
            document.getElementById('adminPassword').value = '';
            loginSection.classList.remove('hidden');
            uploadSection.classList.add('hidden');
            logoutBtn.classList.add('hidden');
        } else {
            loginSection.classList.add('hidden');
            uploadSection.classList.remove('hidden');
            logoutBtn.classList.remove('hidden');
        }
    };

    window.closeAdmin = () => {
        overlay.style.display = 'none';
    };

    window.verifyPassword = () => {
        const pass = document.getElementById('adminPassword').value;
        if (pass === "893012") {
            isAdmin = true;
            mainContainer.classList.add('admin-active');
            loginSection.classList.add('hidden');
            uploadSection.classList.remove('hidden');
            logoutBtn.classList.remove('hidden');
            statusMsg.style.color = "#4ade80";
            statusMsg.innerText = "ACCESS GRANTED";
        } else {
            statusMsg.style.color = "#f87171";
            statusMsg.innerText = "INVALID ACCESS CODE";
        }
    };

    window.logoutAdmin = () => {
        isAdmin = false;
        mainContainer.classList.remove('admin-active');
        window.closeAdmin();
    };

    window.updateFileName = () => {
        const file = document.getElementById('fileInput').files[0];
        if (file) document.getElementById('fileNameLabel').innerText = file.name;
    };

    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) window.closeAdmin();
    });
</script>

</body>
</html>
